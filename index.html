<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>徐家私人看盘系统</title>
  <meta name="description" content="自选股实时行情、分时走势、主力资金、公告和散户评论，一页查看。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="徐家私人看盘系统">
  <meta property="og:description" content="点击查看自选股实时行情、资金流、公告和散户评论。">
  <meta property="og:url" content="https://xumaosheng11-source.github.io/net/">
  <meta property="og:image" content="https://xumaosheng11-source.github.io/net/share-card.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="徐家私人看盘系统">
  <meta name="twitter:description" content="点击查看自选股实时行情、资金流、公告和散户评论。">
  <meta name="twitter:image" content="https://xumaosheng11-source.github.io/net/share-card.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #ffffff;
      --ink: #18202f;
      --muted: #667085;
      --line: #d8e0e9;
      --up: #d92d20;
      --down: #059669;
      --flat: #344054;
      --blue: #2563eb;
      --amber: #b45309;
      --shadow: 0 14px 40px rgba(28, 39, 58, .12);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(37, 99, 235, .10), rgba(238, 242, 246, 0) 280px),
        var(--bg);
      color: var(--ink);
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    .stock-switcher {
      margin-bottom: 14px;
      padding: 14px;
      border: 1px solid rgba(147, 197, 253, .9);
      border-radius: 8px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 14px 36px rgba(37, 99, 235, .12);
      display: grid;
      gap: 12px;
    }

    .search-form {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto;
      gap: 10px;
      align-items: center;
    }

    .search-field {
      min-height: 42px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      background: #f8fafc;
      font: inherit;
      font-weight: 700;
      outline: none;
    }

    .search-field:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .14);
      background: #ffffff;
    }

    .search-button {
      min-height: 42px;
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }

    .watch-action {
      min-height: 42px;
      background: #ffffff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .watch-action.remove {
      color: #475467;
      border-color: var(--line);
      background: #f8fafc;
    }

    .watchlist-area {
      display: grid;
      gap: 7px;
    }

    .watchlist-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .watchlist {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .watch-chip {
      min-height: 40px;
      padding: 0 13px;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      box-shadow: none;
      display: inline-flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .watch-chip.active {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
    }

    .watch-chip small {
      color: currentColor;
      opacity: .72;
      font-weight: 800;
    }

    .watch-pct {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .78);
      font-size: 12px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .watch-pct.up {
      color: #dc2626;
    }

    .watch-pct.down {
      color: #16a34a;
    }

    .watch-pct.flat {
      color: #475467;
    }

    .watch-chip.active .watch-pct {
      background: rgba(255, 255, 255, .12);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .identity {
      display: grid;
      gap: 7px;
    }

    .service-greeting {
      display: inline-grid;
      width: fit-content;
      max-width: 100%;
      padding: 10px 12px;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      box-shadow: 0 10px 24px rgba(37, 99, 235, .10);
    }

    .service-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .greeting-kicker {
      margin: 0;
      color: #2563eb;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.1;
    }

    .greeting {
      margin: 0;
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .74);
      color: #344054;
      font-weight: 700;
      white-space: nowrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      min-height: 38px;
      padding: 0 12px;
      font: inherit;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(28, 39, 58, .06);
    }

    button {
      cursor: pointer;
    }

    button.refresh-option.active {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr);
      gap: 16px;
      align-items: stretch;
      margin-bottom: 16px;
    }

    .price-panel,
    .panel {
      background: rgba(255, 255, 255, .9);
      border: 1px solid rgba(216, 224, 233, .95);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .price-panel {
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .price-grid {
      display: grid;
      grid-template-columns: minmax(190px, .8fr) minmax(0, 1.2fr);
      gap: 18px;
      align-items: end;
    }

    .price {
      font-size: clamp(54px, 8vw, 92px);
      font-weight: 800;
      line-height: .9;
      letter-spacing: 0;
    }

    .delta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 22px;
      font-weight: 800;
    }

    .up {
      color: var(--up);
    }

    .down {
      color: var(--down);
    }

    .flat {
      color: var(--flat);
    }

    .stamp {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .trend-chart {
      min-height: 190px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      overflow: hidden;
      display: grid;
      gap: 8px;
    }

    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .chart-periods {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .chart-period {
      min-height: 30px;
      padding: 0 8px;
      border-radius: 8px;
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      box-shadow: none;
      font-size: 12px;
      white-space: nowrap;
    }

    .chart-period.active {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
    }

    .chart-legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chart-side {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .chart-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: #475467;
      font-size: 12px;
      font-weight: 800;
    }

    .chart-stats strong {
      color: #18202f;
      font-weight: 900;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .legend-dot {
      width: 18px;
      height: 3px;
      border-radius: 999px;
      display: inline-block;
    }

    .chart-message {
      min-height: 140px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .trend-chart svg {
      width: 100%;
      height: 150px;
      display: block;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
      min-height: 82px;
      display: grid;
      align-content: space-between;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .metric::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: #cbd5e1;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      font-size: 20px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .metric-liquidity {
      border-color: #bfdbfe;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
    }

    .metric-liquidity::before {
      background: #2563eb;
    }

    .metric-liquidity strong {
      color: #1d4ed8;
    }

    .metric-open {
      border-color: #c7d2fe;
      background: linear-gradient(135deg, #eef2ff, #ffffff);
    }

    .metric-open::before {
      background: #4f46e5;
    }

    .metric-open strong {
      color: #3730a3;
    }

    .metric-high {
      border-color: #fecaca;
      background: linear-gradient(135deg, #fef2f2, #ffffff);
    }

    .metric-high::before {
      background: #dc2626;
    }

    .metric-high strong {
      color: #b91c1c;
    }

    .metric-low {
      border-color: #bbf7d0;
      background: linear-gradient(135deg, #f0fdf4, #ffffff);
    }

    .metric-low::before {
      background: #16a34a;
    }

    .metric-low strong {
      color: #15803d;
    }

    .metric-volume {
      border-color: #ddd6fe;
      background: linear-gradient(135deg, #f5f3ff, #ffffff);
    }

    .metric-volume::before {
      background: #7c3aed;
    }

    .metric-volume strong {
      color: #5b21b6;
    }

    .metric-limit {
      border-color: #fed7aa;
      background: linear-gradient(135deg, #fff7ed, #ffffff);
    }

    .metric-limit::before {
      background: #ea580c;
    }

    .metric-limit strong {
      color: #c2410c;
    }

    .panel {
      padding: 16px;
    }

    .status-panel {
      align-self: start;
    }

    .panel h2 {
      font-size: 18px;
      line-height: 1.2;
      margin: 0 0 14px;
    }

    .status-list {
      display: grid;
      gap: 12px;
    }

    .status-item {
      display: grid;
      gap: 5px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .status-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .status-item small {
      color: var(--muted);
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .book {
      display: grid;
      gap: 8px;
    }

    .intent-panel {
      display: grid;
      gap: 14px;
    }

    .intent-verdict {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfdff;
      display: grid;
      gap: 7px;
    }

    .intent-verdict strong {
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.15;
    }

    .intent-verdict small {
      color: var(--muted);
      line-height: 1.45;
    }

    .intent-buy .intent-verdict {
      border-color: #fecaca;
      background: linear-gradient(135deg, #fef2f2, #ffffff);
    }

    .intent-buy .intent-verdict strong {
      color: #b91c1c;
    }

    .intent-sell .intent-verdict {
      border-color: #bbf7d0;
      background: linear-gradient(135deg, #f0fdf4, #ffffff);
    }

    .intent-sell .intent-verdict strong {
      color: #15803d;
    }

    .intent-flat .intent-verdict {
      border-color: #c7d2fe;
      background: linear-gradient(135deg, #eef2ff, #ffffff);
    }

    .intent-flat .intent-verdict strong {
      color: #3730a3;
    }

    .intent-bars {
      display: grid;
      gap: 8px;
    }

    .intent-row {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) 90px;
      align-items: center;
      gap: 10px;
      font-variant-numeric: tabular-nums;
      color: #475467;
      font-size: 13px;
    }

    .intent-track {
      height: 12px;
      border-radius: 999px;
      background: #eef2f6;
      overflow: hidden;
    }

    .intent-fill {
      height: 100%;
      width: var(--intent, 0%);
      border-radius: inherit;
    }

    .intent-fill.buy {
      background: #dc2626;
    }

    .intent-fill.sell {
      background: #16a34a;
    }

    .intent-stats {
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .intent-stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
      display: grid;
      gap: 5px;
    }

    .intent-stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .intent-stat strong {
      font-size: 18px;
      color: #101828;
    }

    .fund-flow {
      min-height: 170px;
    }

    .fund-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, #ffffff, #f8fbff);
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(150px, 1fr) 118px minmax(150px, 1fr);
      gap: 16px;
      align-items: center;
    }

    .fund-empty {
      min-height: 150px;
      display: grid;
      align-content: center;
      gap: 6px;
      color: var(--muted);
    }

    .fund-empty strong {
      color: var(--ink);
      font-size: 22px;
    }

    .fund-amount {
      display: grid;
      gap: 8px;
    }

    .fund-amount strong {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .fund-amount span,
    .fund-amount small {
      color: var(--muted);
      line-height: 1.45;
    }

    .fund-positive {
      color: #dc2626;
    }

    .fund-negative {
      color: #16a34a;
    }

    .fund-flat {
      color: #475467;
    }

    .fund-ring {
      width: 112px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(#2563eb 0 var(--main-share, 0%), #dbeafe var(--main-share, 0%) 100%);
      position: relative;
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .12);
      justify-self: center;
    }

    .fund-ring::after {
      content: "";
      width: 58%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 0 1px rgba(216, 224, 233, .9);
      position: absolute;
    }

    .fund-ring span {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      text-align: center;
      color: #1d4ed8;
      font-weight: 900;
      line-height: 1.1;
      font-size: 18px;
    }

    .fund-ring small {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .fund-legend {
      display: grid;
      gap: 10px;
    }

    .fund-legend-row {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      color: #475467;
      font-variant-numeric: tabular-nums;
    }

    .fund-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2563eb;
    }

    .fund-dot.retail {
      background: #dbeafe;
      border: 1px solid #93c5fd;
    }

    .fund-legend-row strong {
      color: var(--ink);
    }

    .fund-substats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 4px;
    }

    .fund-substat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #ffffff;
      display: grid;
      gap: 4px;
    }

    .fund-substat span {
      color: var(--muted);
      font-size: 12px;
    }

    .fund-substat strong {
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }

    .book-row {
      display: grid;
      grid-template-columns: 54px minmax(74px, .8fr) minmax(74px, .8fr) minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 34px;
      font-variant-numeric: tabular-nums;
      position: relative;
    }

    .book-row::after {
      content: "";
      grid-column: 4;
      height: 8px;
      width: var(--depth, 0%);
      border-radius: 999px;
      background: currentColor;
      opacity: .28;
    }

    .book-row b {
      font-size: 13px;
      color: #475467;
    }

    .section-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      font-weight: 800;
      background: #f8fafc;
    }

    td:nth-child(3) {
      color: #475467;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .quick-link {
      border: 1px solid #93c5fd;
      border-radius: 8px;
      padding: 13px 44px 13px 14px;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      text-decoration: none;
      display: grid;
      gap: 4px;
      min-height: 72px;
      position: relative;
      box-shadow: 0 10px 24px rgba(37, 99, 235, .12);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .quick-link::after {
      content: "›";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #2563eb;
      color: #ffffff;
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
    }

    .quick-link:hover {
      border-color: #2563eb;
      box-shadow: 0 14px 30px rgba(37, 99, 235, .18);
      transform: translateY(-1px);
    }

    .quick-link:active {
      transform: translateY(0);
    }

    .quick-link strong {
      color: #1d4ed8;
    }

    .quick-link span {
      color: #475467;
      font-size: 12px;
    }

    .announcements {
      display: grid;
      gap: 10px;
    }

    .announcement-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
      display: grid;
      gap: 8px;
    }

    .announcement-meta {
      display: flex;
      align-items: center;

  <script>
    const defaultWatchlist = [
      { name: "ST京蓝", secid: "0.000711", tencentCode: "s_sz000711", displayCode: "000711", market: "深市主板", preferredName: "ST京蓝" },
      { name: "ST华幸", secid: "1.600340", tencentCode: "s_sh600340", displayCode: "600340", market: "沪市主板", preferredName: "ST华幸" }
    ];

    const stockStorageKey = "xuFamilyWatchlistV1";
    const activeStockStorageKey = "xuFamilyActiveStockV1";
    const chartRanges = [
      { key: "today", label: "今日" },
      { key: "five", label: "五日" },
      { key: "ten", label: "十日" },
      { key: "month", label: "一月" },
      { key: "year", label: "年" }
    ];
    let currentStock = { ...defaultWatchlist[0] };

    const fallbackAnnouncements = [
      {
        art_code: "AN202607031627694711",
        title: "ST京蓝:关于公司股票交易异常波动情况的公告",
        notice_date: "2026-07-03",
        columns: [{ column_name: "股票交易异常波动公告" }],
        detailUrl: "https://data.eastmoney.com/notices/detail/000711/AN202607031627694711.html",
        pdfUrl: "https://data.eastmoney.com/notices/detail/000711/AN202607031627694711.html",
        content: "微信内置浏览器暂时无法连接公告接口时，页面会显示最近缓存公告。请点击“下载完整公告文件”或下方官方公告入口查看公告全文，并以交易所和公司正式披露为准。"
      }
    ];

    const el = {
      stockSearchForm: document.getElementById("stockSearchForm"),
      stockSearchInput: document.getElementById("stockSearchInput"),
      watchAction: document.getElementById("watchAction"),
      watchlist: document.getElementById("watchlist"),
      watchlistStatus: document.getElementById("watchlistStatus"),
      price: document.getElementById("price"),
      delta: document.getElementById("delta"),
      stamp: document.getElementById("stamp"),
      todayDate: document.getElementById("todayDate"),
      marketBadge: document.getElementById("marketBadge"),
      codeLabel: document.getElementById("codeLabel"),
      pageTitle: document.getElementById("pageTitle"),
      metrics: document.getElementById("metrics"),
      orderBook: document.getElementById("orderBook"),
      fundFlow: document.getElementById("fundFlow"),
      toast: document.getElementById("toast"),
      marketState: document.getElementById("marketState"),
      stateNote: document.getElementById("stateNote"),
      refreshButtons: document.querySelectorAll(".refresh-option"),
      trendChart: document.getElementById("trendChart"),
      announcementTitle: document.getElementById("announcementTitle"),
      announcements: document.getElementById("announcements"),
      discussions: document.getElementById("discussions"),
      reader: document.getElementById("announcementReader"),
      readerTitle: document.getElementById("readerTitle"),
      readerMeta: document.getElementById("readerMeta"),
      readerFrame: document.getElementById("readerFrame"),
      readerExternal: document.getElementById("readerExternal"),
      readerClose: document.getElementById("readerClose")
    };

    const state = {
      timer: null,
      requestId: 0,
      inFlight: false,
      announcementTimer: null,
      announcementInFlight: false,
      discussionTimer: null,
      discussionInFlight: false,
      refreshInterval: 3000,
      announcements: [],
      latestQuote: null,
      latestFundFlow: null,
      watchlist: [],
      watchQuotes: {},
      watchQuoteInFlight: false,
      historicalHigh: {},
      historicalHighInFlight: {},
      chartRange: "today",
      searchEditing: false
    };

    function numberValue(value) {
      if (value === null || value === undefined || value === "" || value === "-") return null;
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function stripHtml(value) {
      return String(value || "").replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
    }

    function scaled(value, digits = 2) {
      const n = numberValue(value);
      if (n === null) return null;
      return n / Math.pow(10, digits);
    }

    function emPrice(data, key) {
      return scaled(data[key], numberValue(data.f59) ?? 2);
    }

    function emPct(data, key) {
      return scaled(data[key], 2);
    }

    function priceText(value) {
      const n = numberValue(value);
      return n === null || n === 0 ? "--" : n.toFixed(2);
    }

    function amountText(value) {
      const n = numberValue(value);
      if (n === null) return "--";
      if (Math.abs(n) >= 100000000) return (n / 100000000).toFixed(2) + "亿";
      if (Math.abs(n) >= 10000) return (n / 10000).toFixed(2) + "万";
      return n.toFixed(0);
    }

    function signedAmountText(value) {
      const n = numberValue(value);
      if (n === null) return "--";
      const sign = n > 0 ? "+" : n < 0 ? "-" : "";
      return sign + amountText(Math.abs(n));
    }

    function lotsText(value) {
      const n = numberValue(value);
      if (n === null) return "--";
      if (Math.abs(n) >= 10000) return (n / 10000).toFixed(2) + "万手";
      return n.toFixed(0) + "手";
    }

    function pctText(value) {
      const n = numberValue(value);
      return n === null ? "--" : n.toFixed(2) + "%";
    }

    function ratioText(value) {
      const n = numberValue(value);
      return n === null ? "--" : n.toFixed(2);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function signedText(value) {
      const n = numberValue(value);
      if (n === null) return "--";
      return (n > 0 ? "+" : "") + n.toFixed(2);
    }

    function trendClass(value) {
      const n = numberValue(value);
      if (n === null || n === 0) return "flat";
      return n > 0 ? "up" : "down";
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
    }

    function clearToast() {
      el.toast.textContent = "";
      el.toast.classList.remove("show");
    }

    function stockDisplayName(stockItem) {
      return stockItem.preferredName || stockItem.name || stockItem.displayCode;
    }

    function normalizeStock(stockItem) {
      if (!stockItem || !stockItem.displayCode) return null;
      const code = String(stockItem.displayCode).replace(/\D/g, "").padStart(6, "0").slice(-6);
      const inferred = buildStockFromCode(code, stockItem.name || stockItem.preferredName || code);
      return {
        ...inferred,
        ...stockItem,
        displayCode: code,
        secid: stockItem.secid || inferred.secid,
        tencentCode: stockItem.tencentCode || inferred.tencentCode,
        market: stockItem.market || inferred.market,
        name: stockItem.name || stockItem.preferredName || code
      };
    }

    function buildStockFromCode(code, name = "") {
      const clean = String(code || "").replace(/\D/g, "");
      if (!/^\d{6}$/.test(clean)) return null;
      const isShanghai = /^(5|6|9)/.test(clean);
      const marketPrefix = isShanghai ? "1" : "0";
      const tencentPrefix = isShanghai ? "s_sh" : "s_sz";
      const market = isShanghai ? "沪市" : "深市";
      return {
        name: name || clean,
        secid: marketPrefix + "." + clean,
        tencentCode: tencentPrefix + clean,
        displayCode: clean,
        market
      };
    }

    function normalizeSearchText(value) {
      return String(value || "").trim().replace(/\s+/g, "").toUpperCase();
    }

    function localStockMatch(query) {
      const keyword = normalizeSearchText(query);
      if (!keyword) return null;
      return state.watchlist.find(item => {
        const names = [
          item.displayCode,
          item.name,
          item.preferredName,
          stockDisplayName(item)
        ].map(normalizeSearchText).filter(Boolean);
        return names.some(name => name === keyword || name.includes(keyword) || keyword.includes(name));
      }) || null;
    }

    function stockFromSearchItem(item) {
      if (!item || typeof item !== "object") return null;
      const code = String(item.Code || item.SecurityCode || item.SECURITY_CODE || item.code || item.stockCode || "").replace(/\D/g, "");
      if (!/^\d{6}$/.test(code)) return null;

      const quoteId = String(item.QuoteID || item.QuoteId || item.quoteId || item.Quoteid || "");
      const secid = /^[01]\.\d{6}$/.test(quoteId) ? quoteId : buildStockFromCode(code).secid;
      const marketPrefix = secid.startsWith("1.") ? "1" : "0";
      const tencentCode = (marketPrefix === "1" ? "s_sh" : "s_sz") + code;
      const name = item.Name || item.SecurityName || item.SECURITY_NAME_ABBR || item.name || code;
      const typeText = String(item.SecurityTypeName || item.TypeName || item.typeName || item.MarketType || "");
      if (typeText && !/(A股|股票|沪|深|主板|创业|科创)/.test(typeText)) return null;

      return {
        name,
        secid,
        tencentCode,
        displayCode: code,
        market: marketPrefix === "1" ? "沪市" : "深市"
      };
    }

    function searchPayloadItems(payload) {
      const roots = [
        payload && payload.QuotationCodeTable && payload.QuotationCodeTable.Data,
        payload && payload.Data,
        payload && payload.data,
        payload && payload.result,
        payload
      ];
      const items = [];
      const seen = new Set();

      function visit(value, depth = 0) {
        if (!value || depth > 4) return;
        if (Array.isArray(value)) {
          value.forEach(item => visit(item, depth + 1));
          return;
        }
        if (typeof value !== "object") return;
        const candidate = stockFromSearchItem(value);
        if (candidate && !seen.has(candidate.displayCode)) {
          seen.add(candidate.displayCode);
          items.push(candidate);
        }
        Object.keys(value).forEach(key => {
          if (["Data", "data", "list", "result", "QuotationCodeTable"].includes(key)) {
            visit(value[key], depth + 1);
          }
        });
      }

      roots.forEach(root => visit(root));
      return items;
    }

    async function resolveStockSearch(query) {
      const local = localStockMatch(query);
      if (local) return local;

      const direct = buildStockFromCode(query);
      if (direct) {
        const known = state.watchlist.find(item => item.displayCode === direct.displayCode);
        return known || direct;
      }

      const keyword = String(query || "").trim();
      if (!keyword) return null;

      el.watchlistStatus.textContent = "正在搜索股票...";
      const url = "https://searchapi.eastmoney.com/api/suggest/get?input=" + encodeURIComponent(keyword) + "&type=14&token=D43BF722C8E33BD0A1D7D6DA1D3CB1&count=8";
      const payload = await jsonp(url, "StockSuggest", 8000, "cb");
      const items = searchPayloadItems(payload);
      const matched = items.find(item => {
        const name = normalizeSearchText(item.name);
        const key = normalizeSearchText(keyword);
        return item.displayCode === key || name.includes(key) || key.includes(name);
      }) || items[0];
      return matched || null;
    }

    function mergeWatchlist(items) {
      const map = new Map();
      [...defaultWatchlist, ...items].forEach(item => {
        const normalized = normalizeStock(item);
        if (normalized) map.set(normalized.displayCode, normalized);
      });
      return Array.from(map.values());
    }

    function loadWatchlist() {
      try {
        const saved = JSON.parse(localStorage.getItem(stockStorageKey) || "[]");
        state.watchlist = mergeWatchlist(Array.isArray(saved) ? saved : []);
      } catch (error) {
        state.watchlist = mergeWatchlist([]);
      }

      const savedActive = localStorage.getItem(activeStockStorageKey);
      const active = state.watchlist.find(item => item.displayCode === savedActive);
      currentStock = active ? { ...active } : { ...state.watchlist[0] };
    }

    function saveWatchlist() {
      const custom = state.watchlist.filter(item => !defaultWatchlist.some(base => base.displayCode === item.displayCode));
      try {
        localStorage.setItem(stockStorageKey, JSON.stringify(custom));
        localStorage.setItem(activeStockStorageKey, currentStock.displayCode);
      } catch (error) {
        el.watchlistStatus.textContent = "当前浏览器限制保存，自选股本次打开有效。";
      }
    }

    function isWatched(code = currentStock.displayCode) {
      return state.watchlist.some(item => item.displayCode === code);
    }

    function updateWatchAction() {
      const watched = isWatched();
      const isDefault = defaultWatchlist.some(item => item.displayCode === currentStock.displayCode);
      el.watchAction.textContent = watched ? (isDefault ? "默认自选" : "移出自选") : "加入自选";
      el.watchAction.disabled = isDefault;
      el.watchAction.classList.toggle("remove", watched && !isDefault);
    }

    function signedPctText(value) {
      const n = numberValue(value);
      if (n === null) return "--";
      return (n > 0 ? "+" : "") + n.toFixed(2) + "%";
    }

    function renderWatchlist() {
      el.watchlist.innerHTML = state.watchlist.map(item => {
        const active = item.displayCode === currentStock.displayCode;
        const quote = state.watchQuotes[item.displayCode] || {};
        const pct = numberValue(quote.changePct);
        const pctClass = trendClass(pct);
        return `
          <button class="watch-chip ${active ? "active" : ""}" type="button" data-code="${item.displayCode}" aria-pressed="${active ? "true" : "false"}">
            <span>${escapeHtml(stockDisplayName(item))}</span>
            <small>${escapeHtml(item.displayCode)}</small>
            <strong class="watch-pct ${pctClass}">${signedPctText(pct)}</strong>
          </button>
        `;
      }).join("");
      el.watchlistStatus.textContent = isWatched() ? "自选股涨跌幅随行情刷新同步更新。" : "当前股票还未加入自选。";
      updateWatchAction();
    }

    function updateStockHeading(name) {
      const displayName = name || stockDisplayName(currentStock);
      currentStock.name = displayName;
      el.marketBadge.textContent = currentStock.market || "A股";
      el.codeLabel.textContent = "证券代码 " + currentStock.displayCode;
      el.pageTitle.textContent = displayName + " 实时行情";
      el.announcementTitle.textContent = displayName + "最新公告";
      document.title = "徐家私人看盘系统";
      renderWatchlist();
    }

    function resetStockPanels() {
      state.announcements = [];
      state.latestQuote = null;
      state.latestFundFlow = null;
      state.chartLineColor = "#2563eb";
      delete el.fundFlow.dataset.ready;
      el.price.textContent = "--";
      el.price.className = "price flat";
      el.delta.className = "delta flat";
      el.delta.innerHTML = "<span>--</span><span>--</span>";
      el.stamp.textContent = "等待行情源返回...";
      el.marketState.textContent = "--";
      el.stateNote.textContent = "按行情时间和A股交易时段自动判断。";
      renderMetricsFromEastmoney({});

      renderAnnouncementMessage("正在读取公告...");
      renderDiscussionMessage("正在读取热门讨论...");
    }

    function switchStock(stockItem, options = {}) {
      const normalized = normalizeStock(stockItem);
      if (!normalized) {
        showToast("请输入 6 位股票代码。");
        return;
      }
      currentStock = { ...normalized };
      state.inFlight = false;
      state.announcementInFlight = false;
      state.discussionInFlight = false;
      state.searchEditing = false;
      saveWatchlist();
      updateStockHeading(options.name || stockDisplayName(currentStock));
      resetStockPanels();
      loadAnnouncements();
      loadDiscussions();
      refreshAll();
      resetTimer();
    }

    function toggleCurrentWatch() {
      const defaultItem = defaultWatchlist.find(item => item.displayCode === currentStock.displayCode);
      if (defaultItem) return;

      if (isWatched()) {
        state.watchlist = mergeWatchlist(state.watchlist.filter(item => item.displayCode !== currentStock.displayCode));
        currentStock = { ...defaultWatchlist[0] };
        saveWatchlist();
        switchStock(currentStock);
        return;
      }

      state.watchlist = mergeWatchlist([...state.watchlist, currentStock]);
      saveWatchlist();
      renderWatchlist();
      loadWatchlistQuotes();
      showToast("已加入自选股。");
    }

    function chartShell(content, extra = "") {

    function renderChartMessage(message) {
      chartShell(`<div class="chart-message">${message}</div>`);
    }

    function svgPath(points, getValue, width, height, pad, min, max) {
      const left = typeof pad === "number" ? pad : pad.left;
      const right = typeof pad === "number" ? pad : pad.right;
      const top = typeof pad === "number" ? pad : pad.top;
      const bottom = typeof pad === "number" ? pad : pad.bottom;
      const spread = Math.max(.01, max - min);
      const usableW = width - left - right;
      const usableH = height - top - bottom;
      return points.map((point, index) => {
        const x = left + (points.length === 1 ? usableW : index / (points.length - 1) * usableW);
        const y = top + (max - getValue(point)) / spread * usableH;
        return (index === 0 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1);
      }).join(" ");
    }

    function priceAxisLabel(text, axisX, y) {
      const labelWidth = 54;
      const textX = axisX - 10;
      return `
        <g>
          <rect x="${Math.max(1, axisX - labelWidth - 13)}" y="${y - 14}" width="${labelWidth}" height="19" rx="5" fill="#ffffff" opacity=".92" />
          <text x="${textX}" y="${y}" text-anchor="end" fill="#18202f" font-size="15" font-weight="900">${escapeHtml(text)}</text>
        </g>
      `;
    }

    function renderTrendChart(points) {
      const valid = points.filter(point => point.price !== null);
      if (valid.length < 2) {
        renderChartMessage("分时走势暂无足够数据。休市、停牌或行情源延迟时可能出现这种情况。");
        return;
      }

      const avgPoints = valid.filter(point => point.avg !== null);
      const values = valid.map(point => point.price).concat(avgPoints.map(point => point.avg));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const width = 640;
      const height = 170;
      const pad = { left: 66, right: 18, top: 18, bottom: 28 };
      const pricePath = svgPath(valid, point => point.price, width, height, pad, min, max);
      const avgPath = avgPoints.length > 1 ? svgPath(avgPoints, point => point.avg, width, height, pad, min, max) : "";
      const last = valid[valid.length - 1];
      const first = valid[0];
      const midY = (height / 2).toFixed(1);
      const lastY = (pad.top + (max - last.price) / Math.max(.01, max - min) * (height - pad.top - pad.bottom)).toFixed(1);

      chartShell(`
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(stockDisplayName(currentStock))}分时价格曲线和均价线">
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${height - pad.bottom}" stroke="#d8e0e9" />
          <line x1="${pad.left}" y1="${height - pad.bottom}" x2="${width - pad.right}" y2="${height - pad.bottom}" stroke="#d8e0e9" />
          <line x1="${pad.left}" y1="${midY}" x2="${width - pad.right}" y2="${midY}" stroke="#e5e7eb" stroke-dasharray="5 6" />
          <path d="${pricePath}" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          ${avgPath ? `<path d="${avgPath}" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />` : ""}
          <circle cx="${width - pad.right}" cy="${lastY}" r="4" fill="#2563eb" />
          ${priceAxisLabel(priceText(max), pad.left, 17)}
          ${priceAxisLabel(priceText(min), pad.left, height - pad.bottom)}
        </svg>
      `, `${first.time || "--"} 至 ${last.time || "--"}，现价 ${priceText(last.price)}，均价 ${priceText(last.avg)}`);
    }

    function shortMonthDay(date) {
      const raw = String(date || "");
      if (/^\d{4}-\d{2}-\d{2}\s+/.test(raw)) return raw.slice(5, 10);
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw.slice(5);
      if (/^\d{8}$/.test(raw)) return raw.slice(4, 6) + "-" + raw.slice(6, 8);
      return raw || "--";
    }

    function dateKey(value) {
      const raw = String(value || "");
      if (/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.slice(0, 10);
      if (/^\d{8}/.test(raw)) return raw.slice(0, 4) + "-" + raw.slice(4, 6) + "-" + raw.slice(6, 8);
      return raw;
    }

    function monthLabel(value) {
      const key = dateKey(value);
      const match = key.match(/^\d{4}-(\d{2})/);
      return match ? String(Number(match[1])) + "月" : shortMonthDay(value);
    }

    function chartTickItems(points, label, maxTicks = 6) {
      if (!points.length) return [];

      if (label === "年") {
        const byMonth = [];
        points.forEach((point, index) => {
          const key = dateKey(point.date).slice(0, 7);
          if (key && !byMonth.some(item => item.key === key)) {
            byMonth.push({ key, index, text: monthLabel(point.date) });
          }
        });
        const step = Math.max(1, Math.ceil(byMonth.length / maxTicks));
        return byMonth.filter((item, index) => index % step === 0 || index === byMonth.length - 1);
      }

      const byDate = [];
      points.forEach((point, index) => {
        const key = dateKey(point.date);
        if (key && !byDate.some(item => item.key === key)) {
          byDate.push({ key, index, text: shortMonthDay(point.date) });
        }
      });
      if (byDate.length <= maxTicks) return byDate;
      const step = Math.max(1, Math.ceil(byDate.length / maxTicks));
      return byDate.filter((item, index) => index % step === 0 || index === byDate.length - 1);
    }

    function chartAxisLabels(points, label, width, height, pad) {
      const left = typeof pad === "number" ? pad : pad.left;
      const right = typeof pad === "number" ? pad : pad.right;
      const ticks = chartTickItems(points, label, label === "年" ? 7 : 6);
      return ticks.map(item => {
        const x = left + item.index / Math.max(1, points.length - 1) * (width - left - right);
        const anchor = item.index === 0 ? "start" : item.index === points.length - 1 ? "end" : "middle";
        return `<text x="${x.toFixed(1)}" y="${height - 4}" text-anchor="${anchor}" fill="#667085" font-size="11">${escapeHtml(item.text)}</text>`;
      }).join("");
    }

    function renderFiveDayTrendChart(points) {
      const valid = points.filter(point => point.price !== null);
      if (valid.length < 2) {
        renderChartMessage("五日走势暂无足够数据。休市、停牌或行情源延迟时可能出现这种情况。");
        return;
      }

      const values = valid.map(point => point.price);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const width = 640;
      const height = 170;
      const pad = { left: 66, right: 18, top: 18, bottom: 28 };
      const pricePath = svgPath(valid, point => point.price, width, height, pad, min, max);
      const last = valid[valid.length - 1];
      const first = valid[0];
      const midY = (height / 2).toFixed(1);
      const cls = trendClass(last.price - first.price);
      const stroke = cls === "up" ? "#dc2626" : cls === "down" ? "#16a34a" : "#2563eb";
      state.chartLineColor = stroke;
      const lastY = (pad.top + (max - last.price) / Math.max(.01, max - min) * (height - pad.top - pad.bottom)).toFixed(1);
      const ticks = chartTickItems(valid, "五日", 5);
      const separators = ticks.slice(1).map(item => {
        const x = pad.left + item.index / Math.max(1, valid.length - 1) * (width - pad.left - pad.right);
        return `<line x1="${x.toFixed(1)}" y1="${pad.top}" x2="${x.toFixed(1)}" y2="${height - pad.bottom}" stroke="#e5e7eb" stroke-dasharray="4 6" />`;
      }).join("");
      const dateLabels = chartAxisLabels(valid, "五日", width, height, pad);
      const changePct = first.price ? (last.price - first.price) / first.price * 100 : null;

      chartShell(`
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(stockDisplayName(currentStock))}五日价格曲线">
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${height - pad.bottom}" stroke="#d8e0e9" />
          <line x1="${pad.left}" y1="${height - pad.bottom}" x2="${width - pad.right}" y2="${height - pad.bottom}" stroke="#d8e0e9" />
          <line x1="${pad.left}" y1="${midY}" x2="${width - pad.right}" y2="${midY}" stroke="#e5e7eb" stroke-dasharray="5 6" />
          ${separators}
          <path d="${pricePath}" fill="none" stroke="${stroke}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="${width - pad.right}" cy="${lastY}" r="4" fill="${stroke}" />
          ${priceAxisLabel(priceText(max), pad.left, 17)}
          ${priceAxisLabel(priceText(min), pad.left, height - pad.bottom)}
          ${dateLabels}
        </svg>
      `, `${shortMonthDay(first.date)} ${first.time || "--"} 至 ${shortMonthDay(last.date)} ${last.time || "--"}，最新 ${priceText(last.price)}，区间涨跌 ${signedPctText(changePct)}`);
    }

    function renderHistoryChart(points, label, valueLabel = "收盘") {
      const valid = points.filter(point => point.close !== null && point.close > 0);
      if (valid.length < 2) {
        renderChartMessage(label + "暂无足够数据。休市、停牌或行情源延迟时可能出现这种情况。");

      const values = valid.map(point => point.close);

      const width = 640;

      const pad = { left: 66, right: 18, top: 18, bottom: 28 };
      const closePath = svgPath(valid, point => point.close, width, height, pad, min, max);
      const last = valid[valid.length - 1];
      const first = valid[0];
      const cls = trendClass(last.close - first.close);
      const stroke = cls === "up" ? "#dc2626" : cls === "down" ? "#16a34a" : "#2563eb";
      state.chartLineColor = stroke;
      const lastY = (pad.top + (max - last.close) / Math.max(.01, max - min) * (height - pad.top - pad.bottom)).toFixed(1);
      const midY = (height / 2).toFixed(1);
      const changePct = first.close ? (last.close - first.close) / first.close * 100 : null;
      const axisLabels = chartAxisLabels(valid, label, width, height, pad);

      chartShell(`
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(stockDisplayName(currentStock))}${escapeHtml(label)}价格曲线">
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${height - pad.bottom}" stroke="#d8e0e9" />
          <line x1="${pad.left}" y1="${height - pad.bottom}" x2="${width - pad.right}" y2="${height - pad.bottom}" stroke="#d8e0e9" />
          <line x1="${pad.left}" y1="${midY}" x2="${width - pad.right}" y2="${midY}" stroke="#e5e7eb" stroke-dasharray="5 6" />
          <path d="${closePath}" fill="none" stroke="${stroke}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="${width - pad.right}" cy="${lastY}" r="4" fill="${stroke}" />
          ${priceAxisLabel(priceText(max), pad.left, 17)}
          ${priceAxisLabel(priceText(min), pad.left, height - pad.bottom)}
          ${axisLabels}
        </svg>
      `, `${first.date || "--"} 至 ${last.date || "--"}，最新${valueLabel} ${priceText(last.close)}，区间涨跌 ${signedPctText(changePct)}`);
    }

    function formatEastmoneyTime(value) {
      const raw = String(value || "");
      if (/^\d{10}$/.test(raw) || /^\d{13}$/.test(raw)) {
        const stamp = Number(raw.length === 13 ? raw : raw + "000");
        const date = new Date(stamp);
        if (!Number.isNaN(date.getTime())) {
          return {
            date: [
              date.getFullYear(),
              String(date.getMonth() + 1).padStart(2, "0"),
              String(date.getDate()).padStart(2, "0")
            ].join("-"),
            time: [
              String(date.getHours()).padStart(2, "0"),
              String(date.getMinutes()).padStart(2, "0"),
              String(date.getSeconds()).padStart(2, "0")
            ].join(":")
          };
        }
      }
      if (raw.length < 14) return { date: "", time: "" };
      return {
        date: raw.slice(0, 4) + "-" + raw.slice(4, 6) + "-" + raw.slice(6, 8),
        time: raw.slice(8, 10) + ":" + raw.slice(10, 12) + ":" + raw.slice(12, 14)
      };
    }

    function todayString() {
      const now = new Date();
      return [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0")
      ].join("-");
    }

    function updateTodayLabel() {
      const now = new Date();
      el.todayDate.textContent = "今日日期：" + now.toLocaleDateString("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "short"
      });
    }

    function inferMarketState(date, time) {
      if (!date || !time) return ["等待行情", "暂未拿到行情时间。"];

      const now = new Date();
      const minutes = now.getHours() * 60 + now.getMinutes();
      const inMorning = minutes >= 9 * 60 + 30 && minutes <= 11 * 60 + 30;
      const inAfternoon = minutes >= 13 * 60 && minutes <= 15 * 60;
      const isWeekday = now.getDay() >= 1 && now.getDay() <= 5;

      if (!isWeekday) {
        return ["今日休市", "今天不是A股交易日，页面显示最近一个交易日行情。"];
      }
      if (date !== todayString()) {
        return ["今日休市", "行情源返回日期为 " + date + "，可能是休市、停牌或接口延迟。"];
      }
      if (isWeekday && (inMorning || inAfternoon)) {
        return ["交易时段", "当前处于A股连续竞价时段附近，报价可能持续变化。"];
      }
      if (isWeekday && minutes >= 9 * 60 + 15 && minutes < 9 * 60 + 30) {
        return ["集合竞价", "当前接近开盘集合竞价时段，盘口可能快速变化。"];
      }
      if (isWeekday && minutes > 15 * 60) {
        return ["已收盘", "今日行情时间 " + time + "，盘后报价通常不再连续更新。"];
      }
      return ["休市或未开盘", "当前不在A股连续竞价时段。"];
    }

    function metricTone(label) {
      if (label === "换手率" || label === "量比") return "metric-liquidity";
      if (label === "今开" || label === "昨收" || label === "最新价" || label === "涨跌额" || label === "涨跌幅") return "metric-open";
      if (label === "最高") return "metric-high";
      if (label === "最低") return "metric-low";
      if (label === "成交量" || label === "成交额") return "metric-volume";
      if (label.includes("涨停") || label.includes("跌停")) return "metric-limit";
      return "";
    }

    function renderMetricCards(metrics) {
      el.metrics.innerHTML = metrics.map(([label, value]) => `
        <div class="metric ${metricTone(label)}">
          <span>${label}</span>
          <strong>${value}</strong>
        </div>
      `).join("");
    }

    function renderMetricsFromEastmoney(data) {
      const prev = emPrice(data, "f60");
      const limitUp = prev ? prev * 1.10 : null;
      const limitDown = prev ? prev * .90 : null;
      const metrics = [
        ["换手率", pctText(emPct(data, "f168"))],
        ["量比", ratioText(emPct(data, "f50"))],
        ["今开", priceText(emPrice(data, "f46"))],
        ["昨收", priceText(prev)],
        ["最高", priceText(emPrice(data, "f44"))],
        ["最低", priceText(emPrice(data, "f45"))],
        ["成交量", lotsText(data.f47)],
        ["成交额", amountText(data.f48)],
        ["10%涨停/跌停参考", limitUp && limitDown ? limitUp.toFixed(2) + " / " + limitDown.toFixed(2) : "--"]
      ];

      renderMetricCards(metrics);
    }

    function intentText(buyPct) {
      const sellPct = 100 - buyPct;
      let verdict = "买卖意愿均衡";

      let score = 50;

      if (changePct !== null) score += clamp(changePct * 2.2, -22, 22);
      if (amount) {
        score += clamp(mainNet / Math.max(amount, 1), -0.25, 0.25) * 64;
        score += clamp(largeTotal / Math.max(amount, 1), -0.18, 0.18) * 52;
        score -= clamp(retailNet / Math.max(amount, 1), -0.16, 0.16) * 20;

      const direction = changePct === null ? Math.sign(mainNet + largeTotal) : Math.sign(changePct);
      if (volumeRatio !== null && direction) score += clamp(volumeRatio - 1, -1, 2) * 5 * direction;
      if (turnover !== null && direction) score += clamp(turnover / 6, 0, 1.5) * 4 * direction;

      const buyPct = clamp(Math.round(score), 18, 82);
      const sellPct = 100 - buyPct;

    function participationProfile(point, quote) {
      const mainNet = numberValue(point && point.mainNet) || 0;
      const largeNet = numberValue(point && point.largeNet) || 0;
      const superNet = numberValue(point && point.superNet) || 0;
      const amount = quote ? numberValue(quote.f48) : null;

      const volumeRatio = quote ? emPct(quote, "f50") : null;
      const bigFlow = Math.abs(mainNet) + Math.abs(largeNet + superNet);
      const bigFlowScore = amount ? clamp(bigFlow / Math.max(amount, 1), 0, 1) : 0;
      const volumeScore = volumeRatio === null ? 0 : clamp((volumeRatio - .7) / 1.3, 0, 1);
      const turnoverScore = turnover === null ? 0 : clamp(turnover / 8, 0, 1);
      const flowRatioScore = point && numberValue(point.mainRatio) !== null ? clamp(Math.abs(point.mainRatio) / 12, 0, 1) : 0;
      const mainShare = clamp(Math.round(30 + bigFlowScore * 34 + volumeScore * 14 + turnoverScore * 14 + flowRatioScore * 8), 18, 82);

      return {
        mainShare,
        retailShare: 100 - mainShare,
        basis: amount || turnover !== null || volumeRatio !== null ? "按资金流、成交额、量比、换手率综合估算" : "按资金流活跃度估算"

    function jsonp(url, prefix, timeoutMs = 8000, callbackParam = "cb") {
      state.requestId += 1;
      const id = prefix + state.requestId;
      const callbackName = "__xuStock" + prefix + state.requestId;
      const separator = url.includes("?") ? "&" : "?";

      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error(prefix + " timeout"));
        }, timeoutMs);

        function cleanup() {
          window.clearTimeout(timeout);
          removeScript(id);
          try { delete window[callbackName]; } catch (error) { window[callbackName] = undefined; }
        }

        window[callbackName] = payload => {
          cleanup();
          resolve(payload);
        };

        script.id = id;
        script.src = url + separator + callbackParam + "=" + callbackName + "&_=" + Date.now();
        script.onerror = () => {
          cleanup();
          reject(new Error(prefix + " load failed"));
        };
        document.head.appendChild(script);
      });
    }

      const result = payload && payload.result ? payload.result : payload;

      if (result && Array.isArray(result.data)) return result.data;
      if (result && Array.isArray(result.list)) return result.list;
      if (payload && payload.data && Array.isArray(payload.data.list)) return payload.data.list;
      return [];
    }

    function discussionUrl(post) {
      const id = post.post_id || post.postid || post.id;
      if (id) return "https://guba.eastmoney.com/news," + currentStock.displayCode + "," + id + ".html";
      return "https://guba.eastmoney.com/list," + currentStock.displayCode + ".html";
    }

    function renderDiscussions(posts) {
      const usable = posts.filter(Boolean).slice(0, 5);
      if (!usable.length) {
        renderDiscussionMessage("");
        return;
      }

      el.discussions.innerHTML = usable.map(post => {
        const title = post.post_title || post.title || post.post_content || "未命名讨论";
        const summary = stripHtml(post.post_abstract || post.post_summary || post.digest || "");
        const author = post.user_nickname || post.user_name || "股吧用户";
        const time = shortDate(post.post_publish_time || post.post_last_time || post.update_time);
        const reads = post.post_click_count || post.click_count || post.read_count || "--";
        const replies = post.post_comment_count || post.reply_count || post.comment_count || "--";
        const url = discussionUrl(post);
        return `
          <article class="discussion-card">
            <div class="discussion-meta">
              <span>${escapeHtml(time)}</span>
              <span>${escapeHtml(author)}</span>
              <span>阅读 ${escapeHtml(reads)}</span>
              <span>评论 ${escapeHtml(replies)}</span>
            </div>
            <a class="discussion-open" href="${url}" target="_blank" rel="noreferrer">${escapeHtml(stripHtml(title))}</a>
            ${summary ? `<p class="discussion-summary">${escapeHtml(summary)}</p>` : ""}
          </article>
        `;
      }).join("");
    }

    async function loadDiscussions() {
      if (state.discussionInFlight) return;
      const requestCode = currentStock.displayCode;
      state.discussionInFlight = true;
      try {
        const hotUrl = "https://gbapi.eastmoney.com/webarticlelist/api/Article/Articlelist?code=" + currentStock.displayCode + "&sorttype=1&page=1&ps=5&plat=wap&version=300&product=guba";
        const payload = await jsonp(hotUrl, "DiscussionHot", 8000, "callback");
        if (requestCode !== currentStock.displayCode) return;
        const posts = discussionPosts(payload);
        renderDiscussions(posts);
      } catch (error) {
        try {
          const latestUrl = "https://gbapi.eastmoney.com/webarticlelist/api/Article/Articlelist?code=" + currentStock.displayCode + "&sorttype=0&page=1&ps=5&plat=wap&version=300&product=guba";
          const payload = await jsonp(latestUrl, "DiscussionLatest", 8000, "callback");
          if (requestCode !== currentStock.displayCode) return;
          renderDiscussions(discussionPosts(payload));
        } catch (fallbackError) {
          if (requestCode !== currentStock.displayCode) return;
          renderDiscussionMessage("散户评论读取失败，可能是股吧接口限制。");
        }
      } finally {
        state.discussionInFlight = false;
      }
    }

    function parseTrendPoint(raw) {
      const parts = String(raw || "").split(",");
      const dateTime = parts[0] || "";
      const time = dateTime.includes(" ") ? dateTime.split(" ").pop() : dateTime;
      const date = dateTime.includes(" ") ? dateTime.split(" ")[0] : "";
      const price = numberValue(parts[1]);
      const avgRaw = numberValue(parts[7]);
      return {
        date,
        time,
        price,
        avg: avgRaw && avgRaw > 0 ? avgRaw : null
      };
    }

    function parseKlinePoint(raw) {
      const parts = String(raw || "").split(",");
      return {
        date: parts[0] || "",
        open: numberValue(parts[1]),
        close: numberValue(parts[2]),
        high: numberValue(parts[3]),
        low: numberValue(parts[4])
      };
    }

    async function loadHistoricalHigh() {
      const code = currentStock.displayCode;
      if (state.historicalHigh[code] !== undefined || state.historicalHighInFlight[code]) return;
      state.historicalHighInFlight[code] = true;
      const requestSecid = currentStock.secid;
      const callbackPrefix = "HistoryHigh";
      const fields1 = "f1,f2,f3,f4,f5,f6";
      const fields2 = "f51,f52,f53,f54,f55";
      const url = "https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=" + requestSecid + "&ut=fa5fd1943c7b386f172d6893dbfba10b&fields1=" + fields1 + "&fields2=" + fields2 + "&klt=101&fqt=0&end=20500101&lmt=10000";

      try {
        const payload = await jsonp(url, callbackPrefix, 9000);
        const klines = payload && payload.data && Array.isArray(payload.data.klines) ? payload.data.klines : [];
        const highs = klines.map(parseKlinePoint).map(point => point.high).filter(value => value !== null && value > 0);
        state.historicalHigh[code] = highs.length ? Math.max(...highs) : null;
        if (currentStock.displayCode === code) {
          loadActiveChart().catch(() => {});
        }
      } catch (error) {
        state.historicalHigh[code] = null;
      } finally {
        state.historicalHighInFlight[code] = false;
      }
    }

    function loadEastmoneyTrend(days = 1) {
      state.requestId += 1;
      const requestId = state.requestId;
      const callbackName = "__xuStockTrend" + requestId;
      const requestSecid = currentStock.secid;
      const requestRange = state.chartRange;
      const fields1 = "f1,f2,f3,f4,f5,f6,f7,f8,f9,f10,f11";
      const fields2 = "f51,f52,f53,f54,f55,f56,f57,f58";

      renderChartMessage(days > 1 ? "正在连接五日走势..." : "正在连接分时走势...");
      removeScript("eastmoneyTrendScript");

      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("分时走势接口连接超时"));
        }, 4500);

        function cleanup() {
          window.clearTimeout(timeout);
          removeScript("eastmoneyTrendScript");
          try { delete window[callbackName]; } catch (error) { window[callbackName] = undefined; }
        }

        window[callbackName] = payload => {
          try {
            if (requestSecid !== currentStock.secid || requestRange !== state.chartRange) {
              cleanup();
              resolve();
              return;
            }
            const trends = payload && payload.data && payload.data.trends;
            if (!Array.isArray(trends) || trends.length < 2) {
              throw new Error("分时走势返回为空");
            }
            const parsed = trends.map(parseTrendPoint);
            if (days > 1) {
              renderFiveDayTrendChart(parsed);
            } else {
              renderTrendChart(parsed);
            }
            cleanup();
            resolve();
          } catch (error) {
            cleanup();
            reject(error);
          }
        };

        script.id = "eastmoneyTrendScript";
        script.src = "https://push2his.eastmoney.com/api/qt/stock/trends2/get?cb=" + callbackName + "&secid=" + requestSecid + "&ndays=" + days + "&iscr=0&iscca=0&ut=fa5fd1943c7b386f172d6893dbfba10b&fields1=" + fields1 + "&fields2=" + fields2 + "&_=" + Date.now();
        script.onerror = () => {
          cleanup();
          reject(new Error("分时走势脚本加载失败"));
        };
        document.head.appendChild(script);
      });
    }

    function dailyRangeConfig(range) {
      if (range === "ten") return { limit: 10, label: "十日" };
      if (range === "month") return { limit: 22, label: "一月" };
      if (range === "year") return { limit: 250, label: "年" };
      return { limit: 10, label: "走势" };
    }

          cleanup();
          reject(new Error("五日走势脚本加载失败"));

    function loadEastmoneyDailyChart(range) {
      state.requestId += 1;
      const requestId = state.requestId;
      const callbackName = "__xuStockKline" + requestId;
      const requestSecid = currentStock.secid;

          cleanup();

          window.clearTimeout(timeout);
          removeScript("eastmoneyKlineScript");
          try { delete window[callbackName]; } catch (error) { window[callbackName] = undefined; }

            if (requestSecid !== currentStock.secid || requestRange !== state.chartRange) {
              cleanup();
              resolve();

            if (!Array.isArray(klines) || klines.length < 2) {

        };

        script.onerror = () => {
          cleanup();
          reject(new Error(config.label + "走势脚本加载失败"));
        };
        document.head.appendChild(script);
      });
    }

    function loadActiveChart() {
      if (state.chartRange === "today") return loadEastmoneyTrend(1);
      if (state.chartRange === "five") return loadEastmoneyFiveDayChart();
      return loadEastmoneyDailyChart(state.chartRange);
    }

    function loadEastmoneyQuote() {
      clearToast();
      state.requestId += 1;
      const requestId = state.requestId;
      const callbackName = "__xuStockEastmoney" + requestId;
      const requestSecid = currentStock.secid;
      const fields = "f11,f12,f13,f14,f15,f16,f17,f18,f19,f20,f31,f32,f33,f34,f35,f36,f37,f38,f39,f40,f43,f44,f45,f46,f47,f48,f50,f57,f58,f59,f60,f71,f86,f116,f117,f162,f167,f168,f169,f170,f171";

      removeScript("eastmoneyQuoteScript");

      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("东方财富行情接口连接超时"));
        }, 4500);

        function cleanup() {
          window.clearTimeout(timeout);
          removeScript("eastmoneyQuoteScript");
          try { delete window[callbackName]; } catch (error) { window[callbackName] = undefined; }
        }

        window[callbackName] = payload => {
          try {
            if (requestSecid !== currentStock.secid) {
              cleanup();
              resolve();
              return;
            }
            renderEastmoney(payload);
            cleanup();
            resolve();
          } catch (error) {
            cleanup();
            reject(error);
          }
        };

        script.id = "eastmoneyQuoteScript";

          cleanup();
          reject(new Error("东方财富行情脚本加载失败"));
        };
        document.head.appendChild(script);
      });
    }

    async function loadEastmoneyFundFlow() {
      if (!el.fundFlow.dataset.ready) {
        renderFundFlowEmpty();
      }

      const fields1 = "f1,f2,f3,f7";
      const fields2 = "f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61,f62,f63";
      const requestSecid = currentStock.secid;
      const intradayUrl = "https://push2.eastmoney.com/api/qt/stock/fflow/kline/get?secid=" + requestSecid + "&lmt=1&klt=1&fields1=" + fields1 + "&fields2=" + fields2;
      const dayUrl = "https://push2his.eastmoney.com/api/qt/stock/fflow/daykline/get?secid=" + requestSecid + "&lmt=1&klt=101&fields1=" + fields1 + "&fields2=" + fields2 + "&ut=fa5fd1943c7b386f172d6893dbfba10b";

      try {
        const payload = await jsonp(intradayUrl, "FundFlow", 6500);
        if (requestSecid !== currentStock.secid) return;
        renderFundFlow(latestFundFlowPoint(payload), "东方财富盘中资金流");
      } catch (intradayError) {
        try {
          const payload = await jsonp(dayUrl, "FundFlowDay", 6500);
          if (requestSecid !== currentStock.secid) return;
          renderFundFlow(latestFundFlowPoint(payload), "东方财富日资金流");
        } catch (dayError) {
          if (requestSecid !== currentStock.secid) return;
          if (!el.fundFlow.dataset.ready) {
            renderFundFlowEmpty("资金流接口暂时没有返回，请稍后自动重试。");
          }
        }
      }
    }

    function loadTencentQuote() {
      removeScript("tencentQuoteScript");
      const variableName = "v_" + currentStock.tencentCode;
      const requestCode = currentStock.tencentCode;
      window[variableName] = "";

      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("腾讯备用行情接口连接超时"));
        }, 4500);

        function cleanup() {
          window.clearTimeout(timeout);
          removeScript("tencentQuoteScript");
        }

        script.id = "tencentQuoteScript";
        script.charset = "gbk";
        script.src = "https://qt.gtimg.cn/q=" + requestCode + "&_=" + Date.now();
        script.onload = () => {
          if (requestCode !== currentStock.tencentCode) {
            cleanup();
            resolve();
            return;
          }
          const raw = window[variableName];
          cleanup();
          if (!raw || raw.indexOf(",") === -1) {
            reject(new Error("腾讯备用行情返回为空"));
            return;
          }
          renderTencent(raw);
          resolve();
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("腾讯备用行情脚本加载失败"));
        };
        document.head.appendChild(script);
      });
    }

    async function loadQuote() {
      if (state.inFlight) return;
      state.inFlight = true;
      try {
        const trendRequest = loadActiveChart().catch(() => {
          renderChartMessage("走势暂时没有返回。休市、停牌、网络限制或行情源延迟时，曲线图可能为空。");
        });
        try {
          await loadEastmoneyQuote();
          await loadEastmoneyFundFlow();
        } catch (primaryError) {
          try {
            await loadTencentQuote();
            await loadEastmoneyFundFlow();
            showToast("东方财富实时行情暂时不可用，已切换到腾讯简版行情。买卖意愿和部分财务字段会减少。");
          } catch (fallbackError) {
            showToast("行情加载失败。请确认电脑能访问互联网；如果仍失败，可以先使用下方东方财富或新浪行情入口。");
          }
        }
        await trendRequest;
      } finally {
        state.inFlight = false;
      }
    }

    async function loadWatchlistQuotes() {
      if (state.watchQuoteInFlight || !state.watchlist.length) return;
      state.watchQuoteInFlight = true;
      const secids = state.watchlist.map(item => item.secid).filter(Boolean).join(",");
      if (!secids) {
        state.watchQuoteInFlight = false;
        return;
      }

      try {
        const fields = "f3,f12,f14";
        const url = "https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=" + secids + "&fields=" + fields;
        const payload = await jsonp(url, "WatchQuotes", 5000);
        const rows = payload && payload.data && Array.isArray(payload.data.diff) ? payload.data.diff : [];
        rows.forEach(row => {
          const code = String(row.f12 || "").replace(/\D/g, "");
          if (!/^\d{6}$/.test(code)) return;
          state.watchQuotes[code] = {
            name: row.f14 || code,
            changePct: numberValue(row.f3)
          };
        });
        renderWatchlist();
      } catch (error) {
        renderWatchlist();
      } finally {
        state.watchQuoteInFlight = false;
      }
    }

    function refreshAll() {
      loadQuote();
      loadWatchlistQuotes();
    }

    function resetTimer() {
      if (state.timer) {
        window.clearInterval(state.timer);
        state.timer = null;
      }
      state.timer = window.setInterval(refreshAll, state.refreshInterval);
    }

    function setRefreshInterval(interval) {
      state.refreshInterval = interval;
      el.refreshButtons.forEach(button => {
        const active = Number(button.dataset.refresh) === interval;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
      resetTimer();
      refreshAll();
    }

    el.stockSearchInput.addEventListener("input", () => {
      state.searchEditing = true;
    });

    el.stockSearchForm.addEventListener("submit", async event => {
      event.preventDefault();
      const keyword = el.stockSearchInput.value.trim();
      if (!keyword) {
        showToast("请输入股票代码或中文名称。");
        return;
      }
      try {
        const candidate = await resolveStockSearch(keyword);
        if (!candidate) {
          showToast("没有找到对应 A股，请换成 6 位代码再试。");
          return;
        }
        state.searchEditing = false;
        const known = state.watchlist.find(item => item.displayCode === candidate.displayCode);
        switchStock(known || candidate);
      } catch (error) {
        showToast("中文搜索暂时不可用，请先输入 6 位股票代码。");
      }
    });

    el.watchAction.addEventListener("click", toggleCurrentWatch);

    el.watchlist.addEventListener("click", event => {
      const button = event.target.closest(".watch-chip");
      if (!button) return;
      const stockItem = state.watchlist.find(item => item.displayCode === button.dataset.code);
      if (stockItem) switchStock(stockItem);
    });

    el.trendChart.addEventListener("click", event => {
      const button = event.target.closest(".chart-period");
      if (!button) return;
      const range = button.dataset.chartRange;
      if (!chartRanges.some(item => item.key === range) || state.chartRange === range) return;
      state.chartRange = range;
      loadActiveChart().catch(() => {
        renderChartMessage("走势暂时没有返回。休市、停牌、网络限制或行情源延迟时，曲线图可能为空。");
      });
    });

    el.refreshButtons.forEach(button => {
      button.addEventListener("click", () => {
        setRefreshInterval(Number(button.dataset.refresh));
      });
    });

    el.announcements.addEventListener("click", event => {
      const button = event.target.closest(".announcement-open");
      if (!button) return;
      openAnnouncementReader(button.dataset.artCode);
    });

    el.readerClose.addEventListener("click", closeAnnouncementReader);
    el.reader.addEventListener("click", event => {
      if (event.target === el.reader) closeAnnouncementReader();
    });
    window.addEventListener("keydown", event => {
      if (event.key === "Escape" && el.reader.classList.contains("open")) {
        closeAnnouncementReader();
      }
    });

    loadWatchlist();
    updateTodayLabel();
    updateStockHeading(stockDisplayName(currentStock));
    resetStockPanels();
    loadAnnouncements();
    loadDiscussions();
    state.announcementTimer = window.setInterval(loadAnnouncements, 60000);
    state.discussionTimer = window.setInterval(loadDiscussions, 120000);
    refreshAll();
    resetTimer();
  </script>
