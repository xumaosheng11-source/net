<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ST京蓝 000711 实时行情看板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #ffffff;
      --ink: #18202f;
      --muted: #667085;
      --line: #d8e0e9;
      --up: #d92d20;
      --down: #059669;
      --flat: #344054;
      --blue: #2563eb;
      --amber: #b45309;
      --shadow: 0 14px 40px rgba(28, 39, 58, .12);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(37, 99, 235, .10), rgba(238, 242, 246, 0) 280px),
        var(--bg);
      color: var(--ink);
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .identity {
      display: grid;
      gap: 7px;
    }

    .greeting {
      margin: 0;
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
    }

    .label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .74);
      color: #344054;
      font-weight: 700;
      white-space: nowrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      min-height: 38px;
      padding: 0 12px;
      font: inherit;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(28, 39, 58, .06);
    }

    button {
      cursor: pointer;
    }

    button.refresh-option.active {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr);
      gap: 16px;
      align-items: stretch;
      margin-bottom: 16px;
    }

    .price-panel,
    .panel {
      background: rgba(255, 255, 255, .9);
      border: 1px solid rgba(216, 224, 233, .95);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .price-panel {
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .price-grid {
      display: grid;
      grid-template-columns: minmax(190px, .8fr) minmax(0, 1.2fr);
      gap: 18px;
      align-items: end;
    }

    .price {
      font-size: clamp(54px, 8vw, 92px);
      font-weight: 800;
      line-height: .9;
      letter-spacing: 0;
    }

    .delta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 22px;
      font-weight: 800;
    }

    .up {
      color: var(--up);
    }

    .down {
      color: var(--down);
    }

    .flat {
      color: var(--flat);
    }

    .stamp {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .trend-chart {
      min-height: 190px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      overflow: hidden;
      display: grid;
      gap: 8px;
    }

    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .chart-legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .legend-dot {
      width: 18px;
      height: 3px;
      border-radius: 999px;
      display: inline-block;
    }

    .chart-message {
      min-height: 140px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .trend-chart svg {
      width: 100%;
      height: 150px;
      display: block;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
      min-height: 82px;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      font-size: 20px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .panel {
      padding: 16px;
    }

    .status-panel {
      align-self: start;
    }

    .panel h2 {
      font-size: 18px;
      line-height: 1.2;
      margin: 0 0 14px;
    }

    .status-list {
      display: grid;
      gap: 12px;
    }

    .status-item {
      display: grid;
      gap: 5px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .status-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .status-item small {
      color: var(--muted);
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .book {
      display: grid;
      gap: 8px;
    }

    .book-row {
      display: grid;
      grid-template-columns: 54px minmax(74px, .8fr) minmax(74px, .8fr) minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 34px;
      font-variant-numeric: tabular-nums;
      position: relative;
    }

    .book-row::after {
      content: "";
      grid-column: 4;
      height: 8px;
      width: var(--depth, 0%);
      border-radius: 999px;
      background: currentColor;
      opacity: .28;
    }

    .book-row b {
      font-size: 13px;
      color: #475467;
    }

    .section-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      font-weight: 800;
      background: #f8fafc;
    }

    td:nth-child(3) {
      color: #475467;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .quick-link {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
      text-decoration: none;
      display: grid;
      gap: 4px;
      min-height: 72px;
    }

    .quick-link strong {
      color: #1d2939;
    }

    .quick-link span {
      color: var(--muted);
      font-size: 12px;
    }

    .announcements {
      display: grid;
      gap: 10px;
    }

    .announcement-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
      display: grid;
      gap: 8px;
    }

    .announcement-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .announcement-tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid #fed7aa;
      background: #fff7ed;
      color: #9a3412;
      font-weight: 800;
    }

    .announcement-tag.neutral {
      border-color: var(--line);
      background: #f8fafc;
      color: #475467;
    }

    .announcement-card a {
      font-weight: 800;
      color: #101828;
      text-decoration: none;
      line-height: 1.35;
    }

    .announcement-card a:hover {
      color: var(--blue);
      text-decoration: underline;
    }

    .announcement-open,
    .discussion-open {
      border: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
      min-height: auto;
      color: #101828;
      font-weight: 800;
      text-align: left;
      line-height: 1.35;
    }

    .announcement-open:hover,
    .discussion-open:hover {
      color: var(--blue);
      text-decoration: underline;
    }

    .discussion-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
      display: grid;
      gap: 8px;
    }

    .discussion-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .discussion-summary {
      margin: 0;
      color: #475467;
      font-size: 13px;
      line-height: 1.5;
    }

    .reader-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(15, 23, 42, .58);
      padding: 18px;
    }

    .reader-modal.open {
      display: grid;
      place-items: center;
    }

    .reader-shell {
      width: min(980px, 100%);
      height: min(86vh, 840px);
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      box-shadow: 0 24px 72px rgba(15, 23, 42, .28);
    }

    .reader-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .reader-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .reader-title strong {
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .reader-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .reader-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .reader-link,
    .reader-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      border-radius: 8px;
      min-height: 36px;
      padding: 0 10px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(28, 39, 58, .06);
    }

    .reader-close {
      cursor: pointer;
    }

    .reader-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .notice {
      margin-top: 16px;
      color: #475467;
      font-size: 12px;
      line-height: 1.65;
    }

    .toast {
      margin-top: 12px;
      border: 1px solid #f7d08a;
      background: #fff8eb;
      color: #7a4b10;
      border-radius: 8px;
      padding: 10px 12px;
      display: none;
      line-height: 1.5;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 980px) {
      .hero,
      .layout,
      .section-grid,
      .price-grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .status-panel {
        order: -1;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 1280px);
        padding-top: 14px;
      }

      .topbar {
        display: grid;
        margin-bottom: 12px;
      }

      .greeting {
        font-size: 17px;
      }

      h1 {
        font-size: 30px;
      }

      .controls {
        justify-content: stretch;
      }

      .controls > * {
        flex: 1 1 120px;
      }

      .price-panel,
      .panel {
        padding: 14px;
      }

      .status-list {
        gap: 8px;
      }

      .status-item {
        padding-bottom: 8px;
      }

      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .links {
        grid-template-columns: 1fr;
      }

      .metric {
        min-height: 74px;
        padding: 10px;
      }

      .metric strong {
        font-size: 18px;
      }

      .book-row {
        grid-template-columns: 46px minmax(62px, .8fr) minmax(62px, .8fr) minmax(50px, 1fr);
        gap: 7px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="identity">
        <p class="greeting">徐苹贵，您好！</p>
        <div class="label-row">
          <span id="todayDate">今日日期：--</span>
          <span class="badge">A股</span>
          <span class="badge">深市主板</span>
          <span>证券代码 000711</span>
        </div>
        <h1>ST京蓝 实时行情</h1>
      </div>
      <div class="controls" aria-label="行情刷新控制">
        <button class="refresh-option active" type="button" data-refresh="3000" aria-pressed="true">3秒刷新</button>
        <button class="refresh-option" type="button" data-refresh="1000" aria-pressed="false">1秒刷新</button>
      </div>
    </header>

    <section class="hero" aria-label="核心行情">
      <div class="price-panel">
        <div class="price-grid">
          <div>
            <div id="price" class="price flat">--</div>
            <div id="delta" class="delta flat">
              <span>--</span>
              <span>--</span>
            </div>
          </div>
          <div>
            <div id="trendChart" class="trend-chart" aria-label="分时价格曲线和均价线">
              <div class="chart-head">
                <strong>分时走势</strong>
                <span class="chart-legend">
                  <span class="legend-item"><span class="legend-dot" style="background:#2563eb"></span>现价</span>
                  <span class="legend-item"><span class="legend-dot" style="background:#d97706"></span>均价</span>
                </span>
              </div>
              <div class="chart-message">等待分时走势...</div>
            </div>
            <div id="stamp" class="stamp">等待行情源返回...</div>
          </div>
        </div>
        <div class="metric-grid" id="metrics"></div>
      </div>

      <aside class="panel status-panel">
        <h2>交易状态</h2>
        <div class="status-list">
          <div class="status-item">
            <strong id="marketState">--</strong>
            <small id="stateNote">按行情时间和A股交易时段自动判断。</small>
          </div>
        </div>
        <div id="toast" class="toast"></div>
      </aside>
    </section>

    <section class="layout">
      <div class="panel">
        <h2>五档盘口</h2>
        <div id="orderBook" class="book"></div>
      </div>
    </section>

    <section class="section-grid">
      <div class="panel">
        <h2>ST京蓝最新公告</h2>
        <div id="announcements" class="announcements">
          <div class="announcement-card">
            <div class="announcement-meta">正在读取公告...</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>热门评论</h2>
        <div id="discussions" class="announcements">
          <div class="discussion-card">
            <div class="discussion-meta">正在读取热门讨论...</div>
          </div>
        </div>
      </div>

      <p class="notice">提示：A股休市、停牌、集合竞价或接口延迟时，最新价和五档盘口可能为空或停留在上一交易时段。本页面不构成任何投资建议。</p>
    </section>
  </main>

  <div id="announcementReader" class="reader-modal" aria-hidden="true">
    <div class="reader-shell" role="dialog" aria-modal="true" aria-labelledby="readerTitle">
      <div class="reader-head">
        <div class="reader-title">
          <strong id="readerTitle">公告阅读</strong>
          <span id="readerMeta">正在打开公告...</span>
        </div>
        <div class="reader-actions">
          <a id="readerExternal" class="reader-link" href="#" target="_blank" rel="noreferrer">下载完整公告文件</a>
          <button id="readerClose" class="reader-close" type="button">关闭</button>
        </div>
      </div>
      <iframe id="readerFrame" class="reader-frame" title="公告正文"></iframe>
    </div>
  </div>

  <script>
    const stock = {
      secid: "0.000711",
      tencentCode: "s_sz000711",
      displayCode: "000711"
    };

    const el = {
      price: document.getElementById("price"),
      delta: document.getElementById("delta"),
      stamp: document.getElementById("stamp"),
      todayDate: document.getElementById("todayDate"),
      metrics: document.getElementById("metrics"),
      orderBook: document.getElementById("orderBook"),
      toast: document.getElementById("toast"),
      marketState: document.getElementById("marketState"),
      stateNote: document.getElementById("stateNote"),
      refreshButtons: document.querySelectorAll(".refresh-option"),
      trendChart: document.getElementById("trendChart"),
      announcements: document.getElementById("announcements"),
      discussions: document.getElementById("discussions"),
      reader: document.getElementById("announcementReader"),
      readerTitle: document.getElementById("readerTitle"),
      readerMeta: document.getElementById("readerMeta"),
      readerFrame: document.getElementById("readerFrame"),
      readerExternal: document.getElementById("readerExternal"),
      readerClose: document.getElementById("readerClose")
    };

    const state = {
      timer: null,
      requestId: 0,
      inFlight: false,
      announcementTimer: null,
      announcementInFlight: false,
      discussionTimer: null,
      discussionInFlight: false,
      refreshInterval: 3000,
      announcements: []
    };

    function numberValue(value) {
      if (value === null || value === undefined || value === "" || value === "-") return null;
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function stripHtml(value) {
      return String(value || "").replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
    }

    function scaled(value, digits = 2) {
      const n = numberValue(value);
      if (n === null) return null;
      return n / Math.pow(10, digits);
    }

    function emPrice(data, key) {
      return scaled(data[key], numberValue(data.f59) ?? 2);
    }

    function emPct(data, key) {
      return scaled(data[key], 2);
    }

    function priceText(value) {
      const n = numberValue(value);
      return n === null || n === 0 ? "--" : n.toFixed(2);
    }

    function amountText(value) {
      const n = numberValue(value);
      if (n === null) return "--";
      if (Math.abs(n) >= 100000000) return (n / 100000000).toFixed(2) + "亿";
      if (Math.abs(n) >= 10000) return (n / 10000).toFixed(2) + "万";
      return n.toFixed(0);
    }

    function lotsText(value) {
      const n = numberValue(value);
      if (n === null) return "--";
      if (Math.abs(n) >= 10000) return (n / 10000).toFixed(2) + "万手";
      return n.toFixed(0) + "手";
    }

    function pctText(value) {
      const n = numberValue(value);
      return n === null ? "--" : n.toFixed(2) + "%";
    }

    function ratioText(value) {
      const n = numberValue(value);
      return n === null ? "--" : n.toFixed(2);
    }

    function signedText(value) {
      const n = numberValue(value);
      if (n === null) return "--";
      return (n > 0 ? "+" : "") + n.toFixed(2);
    }

    function trendClass(value) {
      const n = numberValue(value);
      if (n === null || n === 0) return "flat";
      return n > 0 ? "up" : "down";
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
    }

    function clearToast() {
      el.toast.textContent = "";
      el.toast.classList.remove("show");
    }

    function chartShell(content, extra = "") {
      el.trendChart.innerHTML = `
        <div class="chart-head">
          <strong>分时走势</strong>
          <span class="chart-legend">
            <span class="legend-item"><span class="legend-dot" style="background:#2563eb"></span>现价</span>
            <span class="legend-item"><span class="legend-dot" style="background:#d97706"></span>均价</span>
          </span>
        </div>
        ${content}
        ${extra ? `<div class="stamp">${extra}</div>` : ""}
      `;
    }

    function renderChartMessage(message) {
      chartShell(`<div class="chart-message">${message}</div>`);
    }

    function svgPath(points, getValue, width, height, pad, min, max) {
      const spread = Math.max(.01, max - min);
      const usableW = width - pad * 2;
      const usableH = height - pad * 2;
      return points.map((point, index) => {
        const x = pad + (points.length === 1 ? usableW : index / (points.length - 1) * usableW);
        const y = pad + (max - getValue(point)) / spread * usableH;
        return (index === 0 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1);

    function formatEastmoneyTime(value) {
      const raw = String(value || "");
      if (/^\d{10}$/.test(raw) || /^\d{13}$/.test(raw)) {
        const stamp = Number(raw.length === 13 ? raw : raw + "000");
        const date = new Date(stamp);
        if (!Number.isNaN(date.getTime())) {
          return {
            date: [
              date.getFullYear(),
              String(date.getMonth() + 1).padStart(2, "0"),
              String(date.getDate()).padStart(2, "0")
            ].join("-"),
            time: [
              String(date.getHours()).padStart(2, "0"),
              String(date.getMinutes()).padStart(2, "0"),
              String(date.getSeconds()).padStart(2, "0")
            ].join(":")
          };
        }
      }
      if (raw.length < 14) return { date: "", time: "" };
      return {
        date: raw.slice(0, 4) + "-" + raw.slice(4, 6) + "-" + raw.slice(6, 8),
        time: raw.slice(8, 10) + ":" + raw.slice(10, 12) + ":" + raw.slice(12, 14)
      };
    }

    function inferMarketState(date, time) {
      if (!date || !time) return ["等待行情", "暂未拿到行情时间。"];

      const now = new Date();
      const minutes = now.getHours() * 60 + now.getMinutes();
      const inMorning = minutes >= 9 * 60 + 30 && minutes <= 11 * 60 + 30;
      const inAfternoon = minutes >= 13 * 60 && minutes <= 15 * 60;
      const isWeekday = now.getDay() >= 1 && now.getDay() <= 5;

      if (!isWeekday) {
        return ["今日休市", "今天不是A股交易日，页面显示最近一个交易日行情。"];
      }
      if (date !== todayString()) {
        return ["今日休市", "行情源返回日期为 " + date + "，可能是休市、停牌或接口延迟。"];
      }
      if (isWeekday && (inMorning || inAfternoon)) {
        return ["交易时段", "当前处于A股连续竞价时段附近，报价可能持续变化。"];
      }
      if (isWeekday && minutes >= 9 * 60 + 15 && minutes < 9 * 60 + 30) {
        return ["集合竞价", "当前接近开盘集合竞价时段，盘口可能快速变化。"];
      }
      if (isWeekday && minutes > 15 * 60) {
        return ["已收盘", "今日行情时间 " + time + "，盘后报价通常不再连续更新。"];
      }
      return ["休市或未开盘", "当前不在A股连续竞价时段。"];
    }

    function jsonp(url, prefix, timeoutMs = 8000, callbackParam = "cb") {
      state.requestId += 1;
      const id = prefix + state.requestId;
      const callbackName = "__stJinglan" + prefix + state.requestId;
      const separator = url.includes("?") ? "&" : "?";

      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error(prefix + " timeout"));
        }, timeoutMs);

        function cleanup() {
          window.clearTimeout(timeout);
          removeScript(id);
          try { delete window[callbackName]; } catch (error) { window[callbackName] = undefined; }
        }

        window[callbackName] = payload => {
          cleanup();
          resolve(payload);
        };

        script.id = id;
        script.src = url + separator + callbackParam + "=" + callbackName + "&_=" + Date.now();
        script.onerror = () => {
          cleanup();
          reject(new Error(prefix + " load failed"));
        };
        document.head.appendChild(script);
      });
    }

      const requestId = state.requestId;
      const callbackName = "__stJinglanEastmoney" + requestId;
      const fields = "f11,f12,f13,f14,f15,f16,f17,f18,f19,f20,f31,f32,f33,f34,f35,f36,f37,f38,f39,f40,f43,f44,f45,f46,f47,f48,f50,f57,f58,f59,f60,f71,f86,f116,f117,f162,f167,f168,f169,f170,f171";

      removeScript("eastmoneyQuoteScript");

      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("东方财富行情接口连接超时"));
        }, 4500);

        function cleanup() {
          window.clearTimeout(timeout);
          removeScript("eastmoneyQuoteScript");
          try { delete window[callbackName]; } catch (error) { window[callbackName] = undefined; }
        }

        window[callbackName] = payload => {
          try {
            renderEastmoney(payload);
            cleanup();
            resolve();
          } catch (error) {
            cleanup();
            reject(error);
          }
        };

        script.id = "eastmoneyQuoteScript";
        script.src = "https://push2.eastmoney.com/api/qt/stock/get?cb=" + callbackName + "&secid=" + stock.secid + "&fields=" + fields + "&_=" + Date.now();
        script.onerror = () => {
          cleanup();
          reject(new Error("东方财富行情脚本加载失败"));
        };
        document.head.appendChild(script);
      });
    }

    function loadTencentQuote() {
      removeScript("tencentQuoteScript");
      window.v_s_sz000711 = "";

      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("腾讯备用行情接口连接超时"));
        }, 4500);

        function cleanup() {
          window.clearTimeout(timeout);
          removeScript("tencentQuoteScript");
        }

        script.id = "tencentQuoteScript";
        script.charset = "gbk";
        script.src = "https://qt.gtimg.cn/q=" + stock.tencentCode + "&_=" + Date.now();
        script.onload = () => {
          const raw = window.v_s_sz000711;
          cleanup();
          if (!raw || raw.indexOf(",") === -1) {
            reject(new Error("腾讯备用行情返回为空"));
            return;
          }
          renderTencent(raw);
          resolve();
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("腾讯备用行情脚本加载失败"));
        };
        document.head.appendChild(script);
      });
    }

    async function loadQuote() {
      if (state.inFlight) return;
      state.inFlight = true;
      try {
        const trendRequest = loadEastmoneyTrend().catch(() => {
          renderChartMessage("分时走势暂时没有返回。休市、停牌、网络限制或行情源延迟时，曲线图可能为空。");
        });
        try {
          await loadEastmoneyQuote();
        } catch (primaryError) {
          try {
            await loadTencentQuote();
            showToast("东方财富实时行情暂时不可用，已切换到腾讯简版行情。五档盘口和部分财务字段会减少。");
          } catch (fallbackError) {
            showToast("行情加载失败。请确认电脑能访问互联网；如果仍失败，可以先使用下方东方财富或新浪行情入口。");
          }
        }
        await trendRequest;
      } finally {
        state.inFlight = false;
      }
    }

    function resetTimer() {
      if (state.timer) {
        window.clearInterval(state.timer);
        state.timer = null;
      }
      state.timer = window.setInterval(loadQuote, state.refreshInterval);
    }

    function setRefreshInterval(interval) {
      state.refreshInterval = interval;
      el.refreshButtons.forEach(button => {
        const active = Number(button.dataset.refresh) === interval;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
      resetTimer();
      loadQuote();
    }

    el.refreshButtons.forEach(button => {
      button.addEventListener("click", () => {
        setRefreshInterval(Number(button.dataset.refresh));
      });
    });

    el.announcements.addEventListener("click", event => {
      const button = event.target.closest(".announcement-open");
      if (!button) return;
      openAnnouncementReader(button.dataset.artCode);
    });

    el.readerClose.addEventListener("click", closeAnnouncementReader);
    el.reader.addEventListener("click", event => {
      if (event.target === el.reader) closeAnnouncementReader();
    });
    window.addEventListener("keydown", event => {
      if (event.key === "Escape" && el.reader.classList.contains("open")) {
        closeAnnouncementReader();
      }
    });

    updateTodayLabel();
    renderMetricsFromEastmoney({});
    renderOrderBookFromEastmoney({});
    renderChartMessage("等待分时走势...");
    loadAnnouncements();
    loadDiscussions();
    state.announcementTimer = window.setInterval(loadAnnouncements, 60000);
    state.discussionTimer = window.setInterval(loadDiscussions, 120000);
    loadQuote();
    resetTimer();
  </script>
</body>
</html>
